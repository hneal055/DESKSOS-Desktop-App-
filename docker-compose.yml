version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: desksos-postgres
    environment:
      POSTGRES_DB: desksos
      POSTGRES_USER: desksos_admin
      POSTGRES_PASSWORD: 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - desksos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desksos_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: desksos-redis
    command: redis-server --requirepass 
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - desksos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: desksos-api
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: desksos
      DB_USER: desksos_admin
      DB_PASSWORD: 
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 
      JWT_SECRET: 
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - desksos-network
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./server:/app
      - /app/node_modules

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: desksos-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - desksos-network
    restart: unless-stopped

  # Adminer for database management
  adminer:
    image: adminer
    container_name: desksos-adminer
    ports:
      - "8080:8080"
    networks:
      - desksos-network
    restart: unless-stopped

networks:
  desksos-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
